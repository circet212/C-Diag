<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C-Diag</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>C-Diag</h1>
        <button id="resetBtn" class="btn secondary" type="button">Réinitialiser</button>
      </header>

      <section class="panel">
        <h2>Démarrage</h2>
        <div class="actions">
          <button class="btn" data-start="declaration" type="button">Déclaration d'échec</button>
          <button class="btn" data-start="assistance" type="button">Demande d'assistance</button>
        </div>
      </section>

      <section class="panel" id="historyPanel">
        <h2>Historique</h2>
        <ol id="historyList"></ol>
      </section>

      <section class="panel" id="questionPanel">
        <h2 id="questionTitle">Question</h2>
        <div id="choices"></div>
      </section>

      <section class="panel" id="formPanel">
        <h2>Formulaire</h2>
        <form id="dynamicForm"></form>
      </section>

      <section class="panel" id="resultPanel">
        <h2>Trame générée</h2>
        <textarea id="resultText" readonly></textarea>
        <div class="actions">
          <button id="copyBtn" class="btn" type="button">Copier</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
